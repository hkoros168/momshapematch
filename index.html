<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shape Match (Canvas)</title>
  <style>
    :root{
      --bg:#0b1020;
      --text: rgba(233,238,255,.98);
      --muted: rgba(233,238,255,.78);

      --panelBg: rgba(255,255,255,.06);
      --panelBorder: rgba(255,255,255,.14);
      --panelShadow: 0 14px 40px rgba(0,0,0,.42);

      --cardFaceA: #ffffff;
      --cardFaceB: #f3f6ff;
      --cardBorder: rgba(20, 30, 55, .25);
      --cardShadow: 0 14px 28px rgba(0,0,0,.28);
      --cardInnerBorder: rgba(20, 30, 55, .10);

      --focus: rgba(255,255,255,.22);
    }

    *{ box-sizing:border-box; }

    html, body{
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(1200px 800px at 20% 0%, #182a66 0%, rgba(24,42,102,0) 55%),
        radial-gradient(900px 700px at 80% 100%, #3a1a66 0%, rgba(58,26,102,0) 55%),
        var(--bg);
      font-family: system-ui, -apple-system, "PingFang HK", "PingFang TC", "Heiti TC", "Noto Sans CJK TC", Segoe UI, Roboto, Arial, sans-serif;
      padding: 14px;
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    .layout{
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 920px){
      .layout{ grid-template-columns: 1fr; }
    }

    .panel{
      width: 100%;
      background: linear-gradient(180deg, var(--panelBg), rgba(255,255,255,.02));
      border: 1px solid var(--panelBorder);
      border-radius: 22px;
      box-shadow: var(--panelShadow);
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .topbar{
      display:flex;
      justify-content:center;
      margin-bottom: 12px;
    }
    .voiceBtn{
      appearance:none;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(0,0,0,.25);
      color: var(--text);
      border-radius: 999px;
      padding: 16px 22px;
      font-size: 24px;            /* BIGGER */
      font-weight: 950;
      letter-spacing: .2px;
      cursor:pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .voiceBtn:focus{ outline:none; }
    .voiceBtn:focus-visible{ box-shadow: 0 0 0 8px var(--focus); }

    /* Canvas container */
    .stageWrap{ width: 100%; }
    canvas{
      width: 100%;
      height: auto;
      display:block;
      border-radius: 18px;
      outline: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas:focus-visible{ box-shadow: 0 0 0 8px var(--focus); }

    /* ✅ EVEN BIGGER instructions */
    .help{
      padding: 24px 22px;
    }
    .help h2{
      margin: 0 0 14px 0;
      font-size: 46px;           /* BIGGER */
      font-weight: 950;
      letter-spacing: .3px;
      line-height: 1.1;
    }
    .help .big{
      font-size: 36px;           /* BIGGER */
      font-weight: 950;
      line-height: 1.25;
      margin: 12px 0 18px 0;
      color: var(--text);
    }
    .help .step{
      display:flex;
      gap: 16px;
      align-items:flex-start;
      margin: 18px 0;
    }
    .help .num{
      width: 60px;              /* BIGGER */
      height: 60px;
      border-radius: 20px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,.25);
      border: 2px solid rgba(255,255,255,.18);
      font-weight: 950;
      font-size: 36px;          /* BIGGER */
      flex: 0 0 auto;
      line-height: 1;
    }
    .help .text{
      font-size: 36px;          /* BIGGER */
      font-weight: 950;
      line-height: 1.25;
      letter-spacing: .2px;
    }

    /* Message is already large; bump it too */
    .msg{
      position: fixed;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      width: min(820px, calc(100% - 24px));
      padding: 16px 18px;
      border-radius: 18px;
      border:  1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.35);
      box-shadow: 0 10px 26px rgba(0,0,0,.35);
      text-align: center;
      font-weight: 950;
      font-size: clamp(26px, 4.6vw, 44px);  /* BIGGER */
      letter-spacing: .5px;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      backdrop-filter: blur(6px);
    }
    .msg.show{ opacity: 1; }
    .msg.good{ border-color: rgba(47,224,122,.45); }
    .msg.bad{ border-color: rgba(255,59,48,.45); }

    .overlay{
      position: fixed;
      inset: 0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,.50);
      backdrop-filter: blur(4px);
      padding: 18px;
    }
    .overlay.show{ display:flex; }
    .goodBox{
      width: min(680px, 100%);
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(20, 26, 48, .85);
      box-shadow: 0 14px 40px rgba(0,0,0,.42);
      padding: 32px 18px;
      text-align:center;
    }
    .goodWord{
      font-weight: 950;
      font-size: clamp(76px, 14vw, 120px); /* BIGGER */
      letter-spacing: 8px;
      color: var(--text);
      margin: 0;
      user-select:none;
    }
    .goodSub{
      margin: 10px 0 0 0;
      color: var(--muted);
      font-size: 24px;          /* BIGGER */
      user-select:none;
      font-weight: 800;
    }

    /* Narrow screens: still big, but safe */
    @media (max-width: 420px){
      .help h2{ font-size: 40px; }
      .help .big{ font-size: 32px; }
      .help .num{ width: 56px; height: 56px; font-size: 34px; }
      .help .text{ font-size: 32px; }
      .voiceBtn{ font-size: 22px; padding: 14px 18px; }
      .goodSub{ font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="panel" role="application" aria-label="Shape matching game canvas">
      <div class="topbar">
        <button class="voiceBtn" id="voiceBtn" type="button">🔊 聽聲（撳一次）</button>
      </div>
      <div class="stageWrap">
        <canvas id="stage" tabindex="0" aria-label="Tap on cards to play"></canvas>
      </div>
    </div>

    <aside class="panel help" aria-label="Instructions">
      <h2>玩法</h2>
      <div class="big">慢慢嚟。唔使急。</div>

      <div class="step"><div class="num">1</div><div class="text">撳一張卡。</div></div>
      <div class="step"><div class="num">2</div><div class="text">再撳第二張卡。</div></div>
      <div class="step"><div class="num">3</div><div class="text">如果兩張一樣，就成功。</div></div>
      <div class="step"><div class="num">4</div><div class="text">如果唔一樣，等 3 秒會自己返轉。</div></div>
    </aside>
  </div>

  <div class="msg" id="msg" aria-live="polite"></div>

  <div class="overlay" id="goodOverlay" aria-live="polite" aria-label="Completion message">
    <div class="goodBox" role="dialog" aria-modal="true" aria-label="Good job message">
      <div class="goodWord">好叻呀！</div>
      <div class="goodSub">就嚟重新開始…</div>
    </div>
  </div>

  <script>
    (function(){
      document.addEventListener('touchmove', (e) => e.preventDefault(), { passive:false });

      const TXT_MATCH  = "好嘢，啱啱相同！";
      const TXT_WRONG  = "唔啱呀，記住個顏色。";
      const TXT_FINISH = "好叻呀！";

      const SHAPES = [
        { key: "circle",   color: "#ff3b30" },
        { key: "triangle", color: "#34c759" },
        { key: "square",   color: "#007aff" },
      ];
      const COLS = 3, ROWS = 2;
      const GAP = 16;
      const PADDING = 10;

      const FLIP_MS = 220;
      const WRONG_WAIT_MS = 3000;
      const END_RESET_MS = 1600;

      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      const msgEl = document.getElementById('msg');
      const goodOverlay = document.getElementById('goodOverlay');
      const voiceBtn = document.getElementById('voiceBtn');

      let audioCtx = null;
      function ensureAudio(){
        if (!audioCtx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) audioCtx = new AC();
        }
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
      }
      function beep({freq=440, duration=0.12, type="sine", gain=0.06} = {}){
        if (!audioCtx) return;
        const t0 = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + duration + 0.02);
      }
      function playMatchSound(){
        beep({freq: 784, duration: 0.10, type:"sine", gain:0.07});
        setTimeout(() => beep({freq: 988, duration: 0.12, type:"sine", gain:0.07}), 110);
      }
      function playWrongSound(){
        beep({freq: 220, duration: 0.11, type:"triangle", gain:0.08});
        setTimeout(() => beep({freq: 196, duration: 0.13, type:"triangle", gain:0.08}), 120);
      }
      function playFinishSound(){
        const notes = [523, 659, 784, 1046];
        notes.forEach((f, i) => setTimeout(() => beep({freq:f, duration:0.10, type:"sine", gain:0.07}), i*95));
      }

      let cachedVoices = [];
      let cantVoice = null;
      let speechEnabled = false;

      function refreshVoices(){
        if (!("speechSynthesis" in window)) return;
        cachedVoices = window.speechSynthesis.getVoices() || [];
        cantVoice = pickCantoneseVoice(cachedVoices);
      }
      function pickCantoneseVoice(voices){
        const norm = (s) => String(s || "").toLowerCase();
        let v = voices.find(v => norm(v.lang).startsWith("zh-hk"));
        if (v) return v;
        const nameHints = ["sin-ji","sinji","hong kong","hk","cantonese","粵","粤"];
        v = voices.find(v => nameHints.some(h => norm(v.name).includes(h)));
        if (v) return v;
        v = voices.find(v => norm(v.lang).startsWith("zh"));
        return v || null;
      }
      if ("speechSynthesis" in window) {
        refreshVoices();
        window.speechSynthesis.onvoiceschanged = () => refreshVoices();
      }
      function speak(text){
        if (!speechEnabled) return;
        if (!("speechSynthesis" in window)) return;
        try { window.speechSynthesis.cancel(); } catch(e){}
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "zh-HK";
        if (cantVoice) u.voice = cantVoice;
        u.rate = 0.95;
        u.pitch = 1.0;
        u.volume = 1.0;
        try { window.speechSynthesis.speak(u); } catch(e){}
      }
      voiceBtn.addEventListener("click", () => {
        ensureAudio();
        refreshVoices();
        speechEnabled = true;
        voiceBtn.textContent = "🔊 已開聲";
        speak("你好！");
      });

      let msgTimer = null;
      function showMsg(text, kind){
        clearTimeout(msgTimer);
        msgEl.textContent = text;
        msgEl.classList.remove('good','bad','show');
        msgEl.classList.add(kind);
        void msgEl.offsetWidth;
        msgEl.classList.add('show');
        msgTimer = setTimeout(() => msgEl.classList.remove('show'), 900);
      }

      function shuffle(arr){
        for(let i = arr.length - 1; i > 0; i--){
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }
      function cryptoId(){
        if (window.crypto && crypto.getRandomValues) {
          const buf = new Uint32Array(2);
          crypto.getRandomValues(buf);
          return buf[0].toString(16) + buf[1].toString(16);
        }
        return Math.random().toString(16).slice(2) + Date.now().toString(16);
      }

      function makeDeck(){
        const d = [];
        SHAPES.forEach(s => {
          d.push({ id: cryptoId(), key: s.key, color: s.color });
          d.push({ id: cryptoId(), key: s.key, color: s.color });
        });
        return shuffle(d).map(c => ({
          ...c,
          flipped: false,
          matched: false,
          anim: 0,
          target: 0,
        }));
      }

      let deck = [];
      let rects = [];
      let first = null;
      let second = null;
      let lock = false;
      let matches = 0;
      let wrongTimer = null;
      let resetTimer = null;

      function resetState(){
        first = null; second = null; lock = false; matches = 0;
        clearTimeout(wrongTimer); wrongTimer = null;
        clearTimeout(resetTimer); resetTimer = null;
        goodOverlay.classList.remove('show');
        clearTimeout(msgTimer);
        msgEl.classList.remove('show');
      }

      function resizeCanvas(){
        const wrap = canvas.parentElement;
        const cssW = wrap.clientWidth;
        const cssH = Math.round(cssW * 0.72);

        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        canvas.width = Math.floor(cssW * dpr);
        canvas.height = Math.floor(cssH * dpr);
        canvas.style.height = cssH + "px";
        canvas.style.width = cssW + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        layoutCards(cssW, cssH);
        draw();
      }

      function layoutCards(w, h){
        rects = [];
        const totalGapX = GAP * (COLS - 1);
        const totalGapY = GAP * (ROWS - 1);
        const usableW = w - PADDING*2 - totalGapX;
        const usableH = h - PADDING*2 - totalGapY;
        const cardW = usableW / COLS;
        const cardH = usableH / ROWS;

        for(let r=0; r<ROWS; r++){
          for(let c=0; c<COLS; c++){
            const i = r*COLS + c;
            const x = PADDING + c*(cardW + GAP);
            const y = PADDING + r*(cardH + GAP);
            rects[i] = { x, y, w: cardW, h: cardH, r: 18 };
          }
        }
      }

      function roundRectPath(x,y,w,h,r){
        const rr = Math.min(r, w/2, h/2);
        ctx.beginPath();
        ctx.moveTo(x+rr, y);
        ctx.arcTo(x+w, y, x+w, y+h, rr);
        ctx.arcTo(x+w, y+h, x, y+h, rr);
        ctx.arcTo(x, y+h, x, y, rr);
        ctx.arcTo(x, y, x+w, y, rr);
        ctx.closePath();
      }

      function drawCardFace(rect, isFront){
        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,.28)";
        ctx.shadowBlur = 18;
        ctx.shadowOffsetY = 10;

        roundRectPath(rect.x, rect.y, rect.w, rect.h, rect.r);
        const grad = ctx.createLinearGradient(0, rect.y, 0, rect.y + rect.h);
        if (isFront){
          grad.addColorStop(0, "#ffffff");
          grad.addColorStop(1, "#eef2ff");
        } else {
          grad.addColorStop(0, "#ffffff");
          grad.addColorStop(1, "#f7f8ff");
        }
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();

        roundRectPath(rect.x, rect.y, rect.w, rect.h, rect.r);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(20, 30, 55, .25)";
        ctx.stroke();

        roundRectPath(rect.x+10, rect.y+10, rect.w-20, rect.h-20, Math.max(10, rect.r-4));
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(20, 30, 55, .10)";
        ctx.stroke();

        if (isFront){
          ctx.save();
          roundRectPath(rect.x, rect.y, rect.w, rect.h, rect.r);
          ctx.clip();

          ctx.globalAlpha = 0.08;
          ctx.strokeStyle = "rgba(20,30,55,1)";
          ctx.lineWidth = 6;
          const step = 22;
          for(let t = -rect.h; t < rect.w + rect.h; t += step){
            ctx.beginPath();
            ctx.moveTo(rect.x + t, rect.y);
            ctx.lineTo(rect.x + t - rect.h, rect.y + rect.h);
            ctx.stroke();
          }

          ctx.globalAlpha = 0.14;
          const g1 = ctx.createRadialGradient(rect.x+rect.w*0.3, rect.y+rect.h*0.2, 0, rect.x+rect.w*0.3, rect.y+rect.h*0.2, rect.w*0.8);
          g1.addColorStop(0, "rgba(0,122,255,1)");
          g1.addColorStop(1, "rgba(0,122,255,0)");
          ctx.fillStyle = g1;
          ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

          const g2 = ctx.createRadialGradient(rect.x+rect.w*0.7, rect.y+rect.h*0.8, 0, rect.x+rect.w*0.7, rect.y+rect.h*0.8, rect.w*0.8);
          g2.addColorStop(0, "rgba(255,59,48,1)");
          g2.addColorStop(1, "rgba(255,59,48,0)");
          ctx.fillStyle = g2;
          ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

          ctx.restore();

          ctx.save();
          ctx.fillStyle = "rgba(20, 30, 55, .92)";
          ctx.font = `900 ${Math.max(44, Math.floor(rect.w * 0.26))}px system-ui, -apple-system, "PingFang HK", "PingFang TC", sans-serif`; /* BIGGER on cards */
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("撳", rect.x + rect.w/2, rect.y + rect.h/2);
          ctx.restore();
        }
      }

      function drawShape(rect, card){
        const cx = rect.x + rect.w/2;
        const cy = rect.y + rect.h/2 + rect.h*0.03;
        const size = Math.min(rect.w, rect.h) * 0.30;

        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,.28)";
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 8;

        ctx.fillStyle = card.color;
        ctx.strokeStyle = "rgba(255,255,255,.22)";
        ctx.lineWidth = 3;

        if (card.key === "circle"){
          ctx.beginPath();
          ctx.arc(cx, cy, size, 0, Math.PI*2);
          ctx.closePath();
          ctx.fill(); ctx.stroke();
        } else if (card.key === "square"){
          const s = size*1.6;
          const x = cx - s/2, y = cy - s/2;
          const r = Math.max(10, s*0.18);
          ctx.beginPath();
          ctx.moveTo(x+r, y);
          ctx.arcTo(x+s, y, x+s, y+s, r);
          ctx.arcTo(x+s, y+s, x, y+s, r);
          ctx.arcTo(x, y+s, x, y, r);
          ctx.arcTo(x, y, x+s, y, r);
          ctx.closePath();
          ctx.fill(); ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.moveTo(cx, cy - size*1.45);
          ctx.lineTo(cx + size*1.35, cy + size*1.15);
          ctx.lineTo(cx - size*1.35, cy + size*1.15);
          ctx.closePath();
          ctx.fill(); ctx.stroke();
        }
        ctx.restore();
      }

      function draw(){
        const w = canvas.clientWidth;
        const h = parseFloat(canvas.style.height) || (canvas.height / (window.devicePixelRatio||1));
        ctx.clearRect(0,0,w,h);

        for(let i=0; i<deck.length; i++){
          const card = deck[i];
          const rect = rects[i];
          if (!rect) continue;

          const speed = 1 / Math.max(1, Math.round(FLIP_MS / 16));
          if (card.anim < card.target) card.anim = Math.min(card.target, card.anim + speed);
          if (card.anim > card.target) card.anim = Math.max(card.target, card.anim - speed);

          const t = card.anim;
          const scaleX = Math.abs(Math.cos(t * Math.PI));
          const showBack = t > 0.5;

          ctx.save();
          const cx = rect.x + rect.w/2;
          const cy = rect.y + rect.h/2;
          ctx.translate(cx, cy);
          ctx.scale(scaleX, 1);
          ctx.translate(-cx, -cy);

          drawCardFace(rect, !showBack);
          if (showBack) drawShape(rect, card);

          ctx.restore();
        }

        if (deck.some(c => Math.abs(c.anim - c.target) > 0.001)) {
          requestAnimationFrame(draw);
        }
      }

      function pointToIndex(x,y){
        for(let i=0; i<rects.length; i++){
          const r = rects[i];
          if (!r) continue;
          if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return i;
        }
        return -1;
      }

      function pick(index){
        ensureAudio();
        refreshVoices();
        if (lock) return;

        const card = deck[index];
        if (!card || card.matched) return;
        if (card.target === 1) return;

        card.target = 1;
        requestAnimationFrame(draw);

        if (first === null){
          first = index;
          return;
        }
        if (second !== null) return;
        if (index === first) return;

        second = index;

        const a = deck[first];
        const b = deck[second];

        if (a.key === b.key && a.color === b.color){
          a.matched = true;
          b.matched = true;
          matches += 1;

          playMatchSound();
          showMsg(TXT_MATCH, "good");
          speak(TXT_MATCH);

          first = null;
          second = null;

          if (matches === 3){
            lock = true;
            playFinishSound();
            goodOverlay.classList.add('show');
            speak(TXT_FINISH);
            resetTimer = setTimeout(startNewGame, END_RESET_MS);
          }
        } else {
          playWrongSound();
          showMsg(TXT_WRONG, "bad");
          setTimeout(() => speak(TXT_WRONG), 20);

          lock = true;
          wrongTimer = setTimeout(() => {
            deck[first].target = 0;
            deck[second].target = 0;
            requestAnimationFrame(draw);
            first = null;
            second = null;
            lock = false;
          }, WRONG_WAIT_MS);
        }
      }

      function startNewGame(){
        resetState();
        deck = makeDeck();
        deck.forEach(c => { c.anim = 0; c.target = 0; });
        resizeCanvas();
      }

      canvas.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const idx = pointToIndex(x,y);
        if (idx >= 0) pick(idx);
      }, { passive:false });

      canvas.addEventListener('keydown', (e) => {
        const k = e.key;
        if (k >= "1" && k <= "6"){
          e.preventDefault();
          pick(parseInt(k,10) - 1);
        }
      });

      window.addEventListener('resize', () => resizeCanvas());
      startNewGame();
    })();
  </script>
</body>
</html>
